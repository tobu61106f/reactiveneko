# GitHub Pages Deployment Workflow
#
# Deploys to: https://<owner>.github.io/<repo>/
# Current target: https://tobu61106f.github.io/reactiveneko/
#
# To deploy to a custom domain (e.g. https://example.com/):
#   1. Set BASE_PATH to '/' below
#   2. Configure the custom domain in GitHub repo Settings > Pages
#
# To deploy to a different subdirectory (e.g. https://<owner>.github.io/<other-repo>/):
#   1. Change BASE_PATH to '/<other-repo>/'

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  BASE_PATH: /reactiveneko/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build
        env:
          BASE_PATH: ${{ env.BASE_PATH }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
